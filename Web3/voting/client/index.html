<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Simple Voting DApp</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
  <script src="app.js" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #e0e0e0;
    }

    h1 {
      font-size: 1.9rem;
      color: #e0aaff;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle { color: #aaa; font-size: 0.9rem; margin-bottom: 30px; text-align: center; }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 24px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 18px;
      backdrop-filter: blur(10px);
    }

    .card h2 { font-size: 1rem; color: #c77dff; margin-bottom: 14px; letter-spacing: 0.5px; }

    #account {
      font-size: 0.82rem;
      color: #90e0ef;
      word-break: break-all;
      margin-top: 8px;
      text-align: center;
    }

    .btn {
      background: linear-gradient(90deg, #7b2d8b, #4361ee);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.92rem;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.1s;
      width: 100%;
      margin-top: 4px;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      font-size: 0.92rem;
      margin-bottom: 10px;
      outline: none;
    }
    input::placeholder { color: #888; }
    input:focus { border-color: #c77dff; }

    #candidates { list-style: none; }

    .candidate-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .candidate-name { font-size: 0.95rem; font-weight: 600; color: #e0e0e0; }
    .candidate-votes {
      font-size: 0.8rem;
      color: #c77dff;
      background: rgba(199,125,255,0.12);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .vote-btn {
      background: linear-gradient(90deg, #4361ee, #7b2d8b);
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .vote-btn:hover { opacity: 0.82; }

    .status {
      font-size: 0.82rem;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 7px;
      display: none;
    }
    .status.success { background: rgba(72,199,142,0.15); color: #48c78e; display: block; }
    .status.error   { background: rgba(241,70,104,0.15);  color: #f14668; display: block; }

    .row { display: flex; gap: 10px; }
    .row input { margin-bottom: 0; }
  </style>
</head>
<body>

  <h1>&#128229; A Simple Voting DApp</h1>
  <p class="subtitle">Ethereum &bull; Truffle &bull; Ganache &bull; Web3.js</p>

  <!-- Wallet -->
  <div class="card" style="text-align:center;">
    <button class="btn" onclick="connectMetaMask()">&#128274; Connect MetaMask</button>
    <p id="account">Not connected</p>
  </div>

  <!-- Candidates list -->
  <div class="card">
    <h2>&#127775; Candidates</h2>
    <ul id="candidates"><li style="color:#888;font-size:0.88rem;">Connect wallet to load candidates...</li></ul>
    <div id="voteStatus" class="status"></div>
  </div>

  <!-- Add Candidate (owner only) -->
  <div class="card">
    <h2>&#43; Add Candidate <span style="color:#888;font-size:0.75rem;font-weight:400;">(owner only)</span></h2>
    <div class="row">
      <input type="text" id="candidateInput" placeholder="Enter candidate name" />
      <button class="btn" style="width:auto;white-space:nowrap;" onclick="addCandidate()">Add</button>
    </div>
    <div id="addStatus" class="status"></div>
  </div>

</body>
</html>
