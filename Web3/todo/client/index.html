<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decentralized Todo List</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.5.3/dist/web3.min.js"></script>
  <script src="app.js" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #e0e0e0;
    }

    h1 { font-size: 1.9rem; color: #a78bfa; margin-bottom: 6px; text-align: center; }
    .subtitle { color: #aaa; font-size: 0.9rem; margin-bottom: 30px; text-align: center; }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 24px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 18px;
    }

    .card h2 { font-size: 1rem; color: #a78bfa; margin-bottom: 14px; }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      font-size: 0.92rem;
      outline: none;
    }
    input::placeholder { color: #888; }
    input:focus { border-color: #a78bfa; }

    .input-row { display: flex; gap: 10px; }

    .btn {
      background: linear-gradient(90deg, #7c3aed, #4c1d95);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.92rem;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.98); }
    .btn.full { width: 100%; margin-top: 10px; }

    .status {
      font-size: 0.82rem;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 7px;
      display: none;
    }
    .status.success { background: rgba(167,139,250,0.15); color: #a78bfa; display: block; }
    .status.error   { background: rgba(248,113,113,0.15); color: #f87171; display: block; }

    #account { font-size: 0.82rem; color: #a78bfa; word-break: break-all; text-align: center; margin-top: 8px; }

    #taskList { list-style: none; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      margin-bottom: 8px;
      transition: background 0.2s;
    }
    .task-item:hover { background: rgba(255,255,255,0.07); }

    .task-id {
      font-size: 0.75rem;
      color: #6b7280;
      min-width: 24px;
    }

    .task-content {
      flex: 1;
      font-size: 0.92rem;
    }

    .task-content.done {
      text-decoration: line-through;
      color: #6b7280;
    }

    .task-badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
    }
    .badge-done    { background: rgba(52,211,153,0.15); color: #34d399; }
    .badge-pending { background: rgba(251,191,36,0.15); color: #fbbf24; }

    .toggle-btn {
      background: none;
      border: 1px solid rgba(167,139,250,0.4);
      color: #a78bfa;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
      transition: background 0.2s;
    }
    .toggle-btn:hover { background: rgba(167,139,250,0.15); }

    .task-creator {
      font-size: 0.7rem;
      color: #6b7280;
      word-break: break-all;
    }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }
    .stat {
      flex: 1;
      text-align: center;
      padding: 10px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      font-size: 0.82rem;
      color: #aaa;
    }
    .stat span { display: block; font-size: 1.4rem; font-weight: 700; color: #a78bfa; }
  </style>
</head>
<body>

  <h1>&#9989; Decentralized Todo List</h1>
  <p class="subtitle">On-Chain Tasks &bull; Ethereum &bull; Web3.js</p>

  <!-- Wallet -->
  <div class="card" style="text-align:center;">
    <button class="btn" style="width:100%;" onclick="connectWallet()">&#128274; Connect Wallet</button>
    <p id="account">Not connected</p>
  </div>

  <!-- Add Task -->
  <div class="card">
    <h2>&#43; Create New Task</h2>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Describe your task..." />
      <button class="btn" onclick="createTask()">Add Task</button>
    </div>
    <div id="createStatus" class="status"></div>
  </div>

  <!-- Task List -->
  <div class="card">
    <h2>&#128203; All Tasks</h2>
    <div class="stats">
      <div class="stat"><span id="totalCount">0</span>Total</div>
      <div class="stat"><span id="doneCount">0</span>Completed</div>
      <div class="stat"><span id="pendingCount">0</span>Pending</div>
    </div>
    <button class="btn full" style="background:linear-gradient(90deg,#4c1d95,#2e1065);margin-bottom:14px;" onclick="loadTasks()">&#8635; Refresh Tasks</button>
    <ul id="taskList"><li style="color:#888;font-size:0.88rem;">Connect wallet to load tasks...</li></ul>
    <div id="toggleStatus" class="status"></div>
  </div>

</body>
</html>
